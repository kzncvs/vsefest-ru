<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ФЕСТ ВСЕ</title>
  <link rel="icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <meta property="og:title" content="Независимый музыкальный фестиваль «ВСЕ»">
  <meta property="og:description" content="21–24 мая, Казань">
  <meta property="og:image" content="https://fest-vse.ru/assets/web/og_logo.jpg">
  <meta property="og:url" content="https://fest-vse.ru/">
  <meta property="og:type" content="website">
  <meta name="description" content="Независимый музыкальный фестиваль «ВСЕ», 21–24 мая, Казань">
  <style>
    :root {
      --blue: #7BAFD4;
      --purple: #6B4C8A;
      --red: #E04040;
      --bg: #FEFEFE;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      scroll-behavior: smooth;
      overflow-x: hidden;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      overflow-x: hidden;
    }

    /* ─── HERO ─── */
    .hero {
      position: relative;
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(12px, 2.5vh, 32px);
      overflow: visible;
      padding: 24px 0;
    }

    /* ─── SUBTITLE ─── */
    .hero-subtitle {
      position: relative;
      z-index: 10;
      font-family: 'Calibri', 'Gill Sans', 'Trebuchet MS', sans-serif;
      font-weight: 700;
      font-size: clamp(1.2rem, 3vw, 2.2rem);
      color: rgb(1, 0, 1);
      line-height: 1.4;
      transform: scaleY(0.65) scaleX(0.9);
      margin-bottom: -24px;
    }

    /* ─── LOGO COMPOSITE ─── */
    .hero-logo {
      position: relative;
      z-index: 10;
      width: min(65vw, 600px);
      will-change: transform;
      filter: drop-shadow(0 20px 60px rgba(107, 76, 138, 0.12));
    }

    .hero-logo .letters-img {
      display: block;
      width: 100%;
      height: auto;
      will-change: transform;
    }

    /* ─── DATE ─── */
    .hero-date {
      position: relative;
      z-index: 10;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-family: 'Arial Black', 'Arial', sans-serif;
      font-weight: 900;
      font-size: clamp(2.5rem, 6vw, 5rem);
      color: rgb(0, 0, 0);
      line-height: 1.2;
      text-shadow: 0px 4px 0px rgb(120, 84, 137);
      -webkit-text-stroke: 0.5px rgba(132, 174, 203, 0.9);
      paint-order: stroke fill;
      letter-spacing: 2px;
      transform: scale(1.6);
      white-space: nowrap;
    }

    .date-quote {
      width: clamp(20px, 3vw, 36px);
      height: auto;
      opacity: 0.7;
    }
    .date-quote.left {
      transform: translateY(-4px);
    }
    .date-quote.right {
      transform: translateY(4px);
    }

    /* ─── CITY ─── */
    .hero-city {
      position: relative;
      z-index: 10;
      font-family: 'Calibri', 'Gill Sans', 'Trebuchet MS', sans-serif;
      font-weight: 700;
      font-size: clamp(0.9rem, 1.8vw, 1.3rem);
      color: var(--purple);
      text-transform: uppercase;
      letter-spacing: 8px;
      margin: -6px 0 -6px 0;
      opacity: 0.85;
    }

    /* ─── VENUES ─── */
    .hero-venues {
      position: relative;
      z-index: 10;
      width: min(90vw, 820px);
      font-family: 'Calibri', 'Gill Sans', 'Trebuchet MS', sans-serif;
      font-weight: 700;
      font-size: clamp(1.2rem, 3vw, 2.2rem);
      color: rgb(1, 0, 1);
      line-height: 1.4;
      text-align: justify;
      text-align-last: justify;
      transform: scaleY(0.65) scaleX(0.9);
      margin: -12px 0;
    }

    .hero-venues b {
      display: inline-block;
      font-weight: inherit;
    }

    .hero-venues .star {
      display: inline-block;
      font-size: 0.7em;
      letter-spacing: 1px;
      transform: translateY(0.2em);
    }


    /* ─── TICKETS BUTTON ─── */
    .hero-cta {
      position: relative;
      z-index: 20;
      display: inline-flex;
      padding: 18px 56px;
      background: var(--purple);
      border: 2px solid var(--purple);
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(107, 76, 138, 0.25);
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .hero-cta:hover {
      background: #593a6e;
      border-color: #593a6e;
      letter-spacing: 5px;
      box-shadow: 0 8px 32px rgba(107, 76, 138, 0.45);
    }

    .hero-cta:hover .ticket-label {
      color: white;
    }

    .hero-cta:active {
      transform: scale(0.97);
    }

    .ticket-label {
      font-size: 0.95rem;
      font-weight: 600;
      font-family: inherit;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: white;
      white-space: nowrap;
      pointer-events: none;
      transition: color 0.35s ease, letter-spacing 0.35s ease;
    }

    /* hide the qtickets link visually — it stretches over the whole .hero-cta */
    .hero-cta .qtickets-button {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    /* ─── DOODLES ─── */
    .doodle {
      position: absolute;
      z-index: 5;
      will-change: transform;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    .doodle.visible { opacity: 1; }
    .doodle img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .doodle.depth-1 { z-index: 15; }
    .doodle.depth-2 { z-index: 5; }
    .doodle.depth-3 { z-index: 2; }
    .doodle.depth-3.visible { opacity: 0.55; }
    .doodle.stretched { filter: blur(1.5px); opacity: 0; }
    .doodle.stretched.visible { opacity: 0.35; }

    /* ─── PARTNER LOGOS (doodle-style) ─── */
    .doodle.partner {
      pointer-events: auto;
      z-index: 12;
    }
    .doodle.partner a {
      display: block;
      width: 100%;
      height: 100%;
    }
    .doodle.partner img {
      transition: filter 0.3s ease, transform 0.3s ease;
    }
    .doodle.partner:hover img {
      filter: drop-shadow(0 4px 16px rgba(107, 76, 138, 0.25));
      transform: scale(1.08);
    }


    /* ─── LARGE SCREENS ─── */
    @media (min-width: 1400px) {
      .hero-logo {
        width: min(50vw, 700px);
      }
      .doodle { transform: scale(1.1); }
    }

    @media (min-width: 1800px) {
      .hero-logo {
        width: min(45vw, 800px);
      }
      .doodle { transform: scale(1.3); }
      .doodle.partner { transform: scale(1.2); }
    }

    /* ─── TABLET ─── */
    @media (max-width: 1100px) {
      .hero-logo {
        width: min(70vw, 500px);
      }
      .hero-date {
        transform: scale(1.3);
      }
      .doodle.partner { width: 100px !important; }
    }

    /* ─── MOBILE ─── */
    @media (max-width: 768px) {
      .hero-logo {
        width: min(90vw, 420px);
      }
      .hero-cta {
        padding: 14px 32px;
      }
      .ticket-label {
        font-size: 0.8rem;
        letter-spacing: 2px;
      }
      .hero-date {
        text-shadow: 0px 4px 0px rgba(120, 84, 137, 0.35);
      }
      .doodle { transform: scale(0.55) !important; }
      .hero-venues {
        font-size: 0.85rem;
        transform: scaleY(0.7) scaleX(0.95);
      }
    }

    /* ─── SHORT VIEWPORTS ─── */
    @media (max-height: 780px) {
      .hero { gap: clamp(4px, 1vh, 12px); }
      .hero-logo { width: min(50vw, 420px) !important; }
      .hero-date { transform: scale(1.3); }
      .hero-subtitle { margin-bottom: -16px; }
    }

    @media (max-height: 620px) {
      .hero-logo { width: min(45vw, 320px) !important; }
      .hero-date { transform: scale(1.1); }
      .hero-subtitle { font-size: 0.8rem; margin-bottom: -10px; }
    }

    /* ─── MOBILE PARTNERS ─── */
    .partners-mobile {
      display: none;
    }

    @media (max-width: 768px) {
      .partners-mobile {
        position: relative;
        z-index: 20;
        display: flex;
        gap: 16px;
        align-items: center;
      }
      .partners-mobile a {
        display: block;
        width: 50px;
        height: 50px;
      }
      .partners-mobile img {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }
      .doodle.partner {
        display: none !important;
      }
    }

    /* ─── SOCIALS ─── */
    .socials {
      position: relative;
      z-index: 20;
      display: flex;
      gap: 32px;
    }

    .socials a {
      color: var(--purple);
      text-decoration: none;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      opacity: 0.8;
      transition: opacity 0.2s ease;
      white-space: nowrap;
    }

    .socials a:hover {
      opacity: 1;
    }

    @media (max-width: 768px) {
      .socials {
        gap: 20px;
      }
      .socials a {
        font-size: 0.75rem;
      }
    }
  </style>
</head>

  <script>
    const hero = document.querySelector('.hero');
    const doodles = document.querySelectorAll('.doodle');
    const heroLogo = document.querySelector('.hero-logo');
    const lettersImg = document.querySelector('.letters-img');
    let ticking = false;

    function updateParallax() {
      const scrollY = window.scrollY;
      const heroH = hero.offsetHeight;

      if (scrollY < heroH * 1.5) {
        // Outer doodles — strong parallax
        doodles.forEach(d => {
          const speed = parseFloat(d.dataset.speed) || 0.3;
          const y = scrollY * speed;
          const rotate = scrollY * speed * 0.015;
          d.style.transform = `translateY(${y}px) rotate(${rotate}deg)`;
        });

        // Logo container — moves slowly + subtle scale for inner life
        const s = 1 + scrollY * 0.00008;
        heroLogo.style.transform = `translateY(${scrollY * 0.08}px) scale(${s})`;
      }

      ticking = false;
    }

    window.addEventListener('scroll', () => {
      if (!ticking) {
        requestAnimationFrame(updateParallax);
        ticking = true;
      }
    });

    // Reveal doodles staggered
    window.addEventListener('load', () => {
      doodles.forEach((d, i) => {
        setTimeout(() => d.classList.add('visible'), 80 + i * 60);
      });
    });

    // Floating idle animation
    const floatStyles = document.createElement('style');
    floatStyles.textContent = `
      @keyframes f0 { 0%,100%{margin-top:0} 50%{margin-top:-10px} }
      @keyframes f1 { 0%,100%{margin-top:0} 50%{margin-top:8px} }
      @keyframes f2 { 0%,100%{margin-left:0} 50%{margin-left:7px} }
    `;
    document.head.appendChild(floatStyles);

    doodles.forEach((d, i) => {
      const dur = 3 + Math.random() * 4;
      const del = Math.random() * 3;
      d.style.animation = `f${i % 3} ${dur}s ${del}s ease-in-out infinite`;
    });
  </script>
